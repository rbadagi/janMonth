<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Rainforest Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🌿 Amazon Rainforest Snake 🐍</h1>
        <div class="score-board">
            <span>Score: <strong id="score">0</strong></span>
            <span>High Score: <strong id="high-score">0</strong></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="speed-control">
            <label for="speed">Speed:</label>
            <input type="range" id="speed" min="1" max="5" value="3">
            <span id="speed-label">Normal</span>
        </div>
        <p id="message">Press any arrow key or tap Start to begin</p>
        <button id="startBtn">🎮 Start Game</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
